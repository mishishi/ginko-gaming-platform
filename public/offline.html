<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>离线 - 银古客栈</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #e8e8e8;
      padding: 20px;
    }
    .container {
      text-align: center;
      max-width: 400px;
    }
    .lantern {
      font-size: 80px;
      margin-bottom: 24px;
      animation: glow 2s ease-in-out infinite alternate;
    }
    @keyframes glow {
      from { filter: drop-shadow(0 0 10px rgba(255, 140, 50, 0.5)); }
      to { filter: drop-shadow(0 0 25px rgba(255, 140, 50, 0.9)); }
    }
    h1 {
      font-size: 28px;
      margin-bottom: 16px;
      color: #f5f5f5;
    }
    p {
      font-size: 16px;
      color: #b0b0b0;
      line-height: 1.6;
      margin-bottom: 24px;
    }
    .btn {
      display: inline-block;
      padding: 12px 24px;
      background: linear-gradient(135deg, #d4a574 0%, #c9956c 100%);
      color: #1a1a2e;
      text-decoration: none;
      border-radius: 8px;
      font-weight: 600;
      transition: transform 0.2s, box-shadow 0.2s;
    }
    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 4px 20px rgba(212, 165, 116, 0.4);
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="lantern">🏮</div>
    <h1>暂时离线</h1>
    <p>网络连接似乎已断开。请检查您的网络设置，然后重试。</p>
    <a href="/" class="btn">返回首页</a>
  </div>
</body>
</html>
